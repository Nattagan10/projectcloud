<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Inventory Manager</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{font-family:'Kanit',sans-serif;background:#f1f5f9;}
.modal{transition:opacity .25s ease}
body.modal-active{overflow:hidden}
</style>
</head>

<body class="bg-gray-100 text-slate-800">

<!-- HEADER -->
<nav class="bg-slate-900 text-white shadow-xl p-4 sticky top-0 z-40">
<div class="container mx-auto flex justify-between items-center">

<div class="flex items-center space-x-3">
<div class="bg-blue-600 p-2 rounded-lg">
<i class="fa-solid fa-boxes-stacked text-xl"></i>
</div>
<h1 class="text-xl font-bold">Inventory Management Dashboard</h1>
</div>

<button onclick="openAddModal()" class="bg-blue-600 hover:bg-blue-500 px-5 py-2.5 rounded-xl font-bold">
<i class="fa-solid fa-plus mr-2"></i> เพิ่มสินค้าใหม่
</button>

</div>
</nav>

<div class="container mx-auto p-4 md:p-8">

<!-- DASHBOARD -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">

<div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-blue-500">
<p class="text-slate-400 text-sm uppercase">สินค้าทั้งหมด</p>
<h2 id="stat-total" class="text-4xl font-black">0</h2>
</div>

<div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-orange-500">
<p class="text-slate-400 text-sm uppercase">สต๊อกต่ำ</p>
<h2 id="stat-warning" class="text-4xl font-black text-orange-600">0</h2>
</div>

<div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-red-500">
<p class="text-slate-400 text-sm uppercase">หมดอายุ</p>
<h2 id="stat-expired" class="text-4xl font-black text-red-600">0</h2>
</div>

</div>

<div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

<!-- TABLE -->
<div class="lg:col-span-3 bg-white rounded-3xl shadow-sm border">

<div class="p-6 border-b">

<h3 class="font-bold text-slate-700 mb-4">
<i class="fa-solid fa-list mr-2 text-blue-500"></i>
รายการสินค้าคงคลัง
</h3>

<!-- SEARCH -->
<div class="flex flex-col md:flex-row gap-3">

<input id="searchName"
type="text"
placeholder="ค้นหาชื่อสินค้า"
class="px-4 py-2 border rounded-xl w-full">

<select id="searchCategory"
class="px-4 py-2 border rounded-xl">

<option value="">All Category</option>
<option value="Dairy">Dairy</option>
<option value="Snacks">Snacks</option>
<option value="Produce">Produce</option>
<option value="Meat">Meat</option>
<option value="Bakery">Bakery</option>
<option value="Other">Other</option>

</select>

</div>

</div>

<div class="overflow-x-auto">

<table class="w-full text-left">

<thead>

<tr class="text-slate-400 text-xs uppercase border-b">

<th class="p-5">ชื่อสินค้า</th>
<th class="p-5 text-center">คงเหลือ</th>
<th class="p-5 text-center">วันคงเหลือ</th>
<th class="p-5 text-center">สถานะ</th>
<th class="p-5 text-center">จัดการ</th>

</tr>

</thead>

<tbody id="data-table"></tbody>

</table>

</div>
</div>

<!-- ALERT -->
<div class="bg-white rounded-3xl shadow-sm border">

<div class="p-6 border-b font-bold">
<i class="fa-solid fa-bell mr-2 text-orange-500"></i>
แจ้งเตือนด่วน
</div>

<div id="alert-panel" class="p-6 space-y-4"></div>

</div>

</div>
</div>

<!-- ADD ITEM MODAL -->
<div id="addModal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center z-50">

<div class="bg-white w-full max-w-md rounded-2xl p-6">

<h2 class="text-xl font-bold mb-4">เพิ่มสินค้าใหม่</h2>

<div class="space-y-3">

<input id="itemName" type="text" placeholder="ชื่อสินค้า"
class="w-full border px-3 py-2 rounded-lg">

<select id="itemCategory" class="w-full border px-3 py-2 rounded-lg">
<option value="Dairy">Dairy</option>
<option value="Snacks">Snacks</option>
<option value="Produce">Produce</option>
<option value="Meat">Meat</option>
<option value="Bakery">Bakery</option>
<option value="Other">Other</option>
</select>

<input id="itemStock" type="number" placeholder="จำนวนสินค้า"
class="w-full border px-3 py-2 rounded-lg">

<input id="itemExpiry" type="date" placeholder="วันก่อนหมดอายุ"
class="w-full border px-3 py-2 rounded-lg">

</div>

<div class="flex justify-end gap-3 mt-5">

<button onclick="closeAddModal()"
class="px-4 py-2 bg-gray-300 rounded-lg">
ยกเลิก
</button>

<button onclick="addItem()"
class="px-4 py-2 bg-blue-600 text-white rounded-lg">
เพิ่มสินค้า
</button>

</div>

</div>
</div>

<script>

function openEditModal(id){

const item=currentItems.find(i=>i._id===id)

editId=id

document.getElementById("itemName").value=item.ItemName
document.getElementById("itemCategory").value=item.Category
document.getElementById("itemStock").value=item.StockQty

const date=new Date(item.ExpiryDate)
document.getElementById("itemExpiry").value=date.toISOString().split("T")[0]

openAddModal()

}

// OPEN MODAL
function openAddModal(){
document.getElementById("addModal").classList.remove("hidden")
document.getElementById("addModal").classList.add("flex")
}

// CLOSE MODAL
function closeAddModal(){
document.getElementById("addModal").classList.add("hidden")
document.getElementById("addModal").classList.remove("flex")
}

// ADD ITEM
async function addItem(){

const name = document.getElementById("itemName").value.trim()
const category = document.getElementById("itemCategory").value
const stock = document.getElementById("itemStock").value
const expiry = document.getElementById("itemExpiry").value

if(!name || !stock || !expiry){
alert("กรุณากรอกข้อมูลให้ครบ")
return
}
try{

const url = editId ? API_URL+"/"+editId : API_URL
const method = editId ? "PUT" : "POST"

const res = await fetch(url,{
method:method,
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
ItemName:name,
Category:category,
StockQty:Number(stock),
ExpiryDate:expiry
})
})

if(!res.ok){
throw new Error("Failed")
}

closeAddModal()
fetchItems()

}catch(err){

alert("เพิ่มสินค้าไม่สำเร็จ")
console.log(err)

}

}

const API_URL="https://projectcloud-1.onrender.com/api/items"

let currentItems=[]
let editId=null


// FETCH DATA
async function fetchItems(){

const res=await fetch(API_URL)

currentItems=await res.json()

renderUI()

}


// RENDER UI
function renderUI(){

const table=document.getElementById("data-table")
const alertPanel=document.getElementById("alert-panel")

const searchName=document.getElementById("searchName").value.toLowerCase()
const searchCategory=document.getElementById("searchCategory").value

let tableHTML=""
let alertHTML=""

let cWarning=0
let cExpired=0


// FILTER SEARCH
const filtered=currentItems.filter(item=>{

const nameMatch=item.ItemName.toLowerCase().includes(searchName)

const catMatch=searchCategory==""||item.Category==searchCategory

return nameMatch&&catMatch

})


// LOOP
filtered.forEach(item=>{

const days=item.DaysUntilExpiry
const stock=item.StockQty

let badge='<span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-xs font-bold">ปกติ</span>'


// ALERT LOGIC

if(days<0){

badge='<span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs font-bold">หมดอายุ</span>'

cExpired++

alertHTML+=createAlert(item.ItemName,"สินค้าหมดอายุแล้ว","red")

}

else if(stock<=20 && days<=7){

badge='<span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs font-bold">ด่วนมาก</span>'

cWarning++

alertHTML+=createAlert(item.ItemName,`สต๊อก ${stock} และหมดอายุใน ${days} วัน`,"red")

}

else if(stock<=20){

badge='<span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold">สต๊อกต่ำ</span>'

cWarning++

alertHTML+=createAlert(item.ItemName,`สต๊อกเหลือ ${stock}`,"orange")

}

else if(days<=7){

badge='<span class="bg-yellow-100 text-yellow-600 px-3 py-1 rounded-full text-xs font-bold">ใกล้หมดอายุ</span>'

cWarning++

alertHTML+=createAlert(item.ItemName,`หมดอายุใน ${days} วัน`,"yellow")

}


// TABLE

tableHTML+=`

<tr>

<td class="p-5">

<div class="font-bold">${item.ItemName}</div>
<div class="text-xs text-slate-400">${item.Category}</div>

</td>

<td class="p-5 text-center">${stock}</td>

<td class="p-5 text-center">${days}</td>

<td class="p-5 text-center">${badge}</td>

<td class="p-5 text-center">

<td class="p-5 text-center space-x-2">

<button onclick="openEditModal('${item._id}')" class="text-blue-500">
<i class="fa-solid fa-pen"></i>
</button>

<button onclick="deleteItem('${item._id}')" class="text-red-500">
<i class="fa-solid fa-trash"></i>
</button>

</td>

</td>

</tr>

`

})


// DISPLAY

table.innerHTML=tableHTML||"<tr><td colspan='5' class='p-10 text-center'>ไม่มีข้อมูล</td></tr>"

alertPanel.innerHTML=alertHTML||"<div class='text-center text-slate-300'>ไม่มีการแจ้งเตือน</div>"

document.getElementById("stat-total").innerText=filtered.length
document.getElementById("stat-warning").innerText=cWarning
document.getElementById("stat-expired").innerText=cExpired

}


// ALERT CARD
function createAlert(name,msg,color){

const styles={
red:"bg-red-50 border-red-200 text-red-700",
orange:"bg-orange-50 border-orange-200 text-orange-700",
yellow:"bg-yellow-50 border-yellow-200 text-yellow-700"
}

return `
<div class="p-4 border rounded-xl ${styles[color]}">

<div class="text-sm font-bold">${name}</div>

<div class="text-xs">${msg}</div>

</div>
`

}


// DELETE
async function deleteItem(id){

if(!confirm("ยืนยันการลบ?")) return

await fetch(API_URL+"/"+id,{method:"DELETE"})

fetchItems()

}


// REALTIME SEARCH
document.getElementById("searchName").addEventListener("keyup",renderUI)

document.getElementById("searchCategory").addEventListener("change",renderUI)


window.onload=fetchItems

</script>

</body>
</html>
